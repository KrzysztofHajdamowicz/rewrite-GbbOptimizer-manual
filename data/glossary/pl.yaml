plantid:
  term: "PlantId"
  short: "Unikalny identyfikator instalacji fotowoltaicznej"
  definition: "Unikalny ciąg znaków przypisany do każdej instalacji zarejestrowanej w GbbOptimizer. Używany jako prefiks we wszystkich tematach MQTT oraz do uwierzytelniania."

planttoken:
  term: "PlantToken"
  short: "Token uwierzytelniający do MQTT i API"
  definition: "Tajny token generowany dla każdej instalacji, używany jako hasło MQTT oraz do uwierzytelniania w API."

soc:
  term: "SOC"
  short: "Stan naładowania — poziom baterii w procentach (0–100%)"
  definition: "Stan naładowania (State of Charge) określa aktualny poziom energii w baterii jako wartość procentową od 0% (pusta) do 100% (pełna)."

minsoc:
  term: "MinSOC"
  short: "Minimalny próg stanu naładowania"
  definition: "Minimalny poziom naładowania baterii utrzymywany przez optymalizator. System zapobiega rozładowaniu poniżej tego progu, chroniąc żywotność baterii."

maxsoc:
  term: "MaxSOC"
  short: "Maksymalny docelowy stan naładowania"
  definition: "Maksymalny SOC, do którego optymalizator będzie ładował baterię. Zalecana wartość to 90%, aby zapewnić bufor na niedokładności prognozy PV."

gridsetpoint:
  term: "GridSetpoint"
  short: "Docelowa wartość wymiany mocy z siecią w watach"
  definition: "Określa, ile mocy powinno przepływać do/z sieci podczas normalnej pracy. Wartości dodatnie oznaczają pobór z sieci, ujemne — eksport do sieci."

dynamicdischarge:
  term: "Dynamic Discharge"
  short: "Algorytm rozładowania reagujący na cenę energii"
  definition: "Zaawansowany tryb rozładowania, który dostosowuje moc wyjściową baterii w czasie rzeczywistym na podstawie zmian ceny sprzedaży energii, zamiast korzystać ze stałych okien czasowych."

rte:
  term: "RTE"
  short: "Sprawność cyklu ładowania/rozładowania"
  definition: "Stosunek energii oddanej do energii pobranej w pełnym cyklu ładowania i rozładowania. Mierzy całkowitą sprawność systemu bateryjnego, uwzględniając straty konwersji."

fastsetup:
  term: "FastSetup"
  short: "Kreator szybkiej konfiguracji początkowej"
  definition: "Proces konfiguracji uruchamiany po utworzeniu nowej instalacji. Ustawia podstawowe parametry i nawiązuje początkowe połączenie z falownikiem."

testmode:
  term: "Test Mode"
  short: "Tryb obserwacji — oblicza, ale nie wysyła komend"
  definition: "Początkowy tryb pracy dla nowych instalacji. Optymalizator wykonuje obliczenia i prognozy, ale nie wysyła żadnych komend do falownika. Powinien być aktywny przez około tydzień, aż system się skalibruje."

ess:
  term: "ESS"
  short: "System magazynowania energii"
  definition: "Moduł Energy Storage System firmy Victron, zarządzający ładowaniem i rozładowaniem baterii oraz interakcją z siecią."

vrm:
  term: "VRM"
  short: "Portal zdalnego zarządzania Victron"
  definition: "Portal chmurowy Victron (VRM Portal) do zdalnego monitorowania i zarządzania systemami Victron."

modbus:
  term: "Modbus"
  short: "Protokół komunikacji szeregowej dla urządzeń przemysłowych"
  definition: "Protokół komunikacji szeregowej używany do komunikacji z falownikami. GbbConnect2 wykorzystuje ModbusInMqtt do przesyłania komend Modbus w wiadomościach MQTT."

modbusinmqtt:
  term: "ModbusInMqtt"
  short: "Komendy Modbus przesyłane przez MQTT"
  definition: "Protokół używany przez GbbConnect2, w którym komendy odczytu/zapisu rejestrów Modbus są enkapsulowane w wiadomościach MQTT, umożliwiając zdalne sterowanie falownikiem przez chmurę."

selfconsumption:
  term: "Self-Consumption"
  short: "Procent energii słonecznej zużywanej lokalnie"
  definition: "Udział wytworzonej energii słonecznej, który jest bezpośrednio zużywany przez gospodarstwo domowe, a nie eksportowany do sieci."

selfsufficiency:
  term: "Self-Sufficiency"
  short: "Procent zużycia pokrywanego przez fotowoltaikę"
  definition: "Udział całkowitego zużycia energii przez gospodarstwo domowe, który jest pokrywany przez instalację fotowoltaiczną, a nie importowany z sieci."

correctionfactor:
  term: "Correction Factor"
  short: "Kalibracja dokładności prognozy PV"
  definition: "Mnożnik obliczany w ciągu około tygodnia pracy, który koryguje wartości prognozy PV tak, aby odpowiadały rzeczywistej produkcji, poprawiając dokładność przewidywań."

batteryfulldate:
  term: "Battery Full Date"
  short: "Zaplanowany dzień pełnego naładowania do 100% SOC"
  definition: "Konkretne dni miesiąca, w których optymalizator dąży do naładowania baterii do 100% SOC. Podawane jako wartości rozdzielone przecinkami (np. '1, 15'). Umożliwia okresowe pełne cykle ładowania dla zdrowia baterii."

gbbconnect2:
  term: "GbbConnect2"
  short: "Lokalne oprogramowanie do bezpośredniego połączenia z falownikiem"
  definition: "Aplikacja działająca lokalnie (Windows lub Docker), łącząca falownik bezpośrednio z GbbOptimizer przez ModbusInMqtt, z pominięciem usług chmurowych takich jak Solarman."

dongledirect:
  term: "DongleDirect"
  short: "Metoda połączenia przez przekierowanie dongla"
  definition: "Metoda połączenia, w której dongle WiFi falownika jest przekonfigurowany tak, aby komunikował się bezpośrednio z serwerem GbbOptimizer zamiast z chmurą producenta."

solarassistant:
  term: "SolarAssistant"
  short: "Oprogramowanie monitorujące falowniki"
  definition: "Aplikacja monitorująca, która łączy się z falownikami i publikuje dane przez MQTT. Może służyć jako pomost między falownikami Deye a GbbOptimizer przez Home Assistant."
