plantid:
  term: "PlantId"
  short: "Unique identifier for your solar installation"
  definition: "A unique string identifier assigned to each solar plant registered in GbbOptimizer. Used as the root prefix in all MQTT topics and for authentication."

planttoken:
  term: "PlantToken"
  short: "Authentication token for MQTT and API access"
  definition: "A secret token generated for each plant, used as the MQTT password and for API authentication."

soc:
  term: "SOC"
  short: "State of Charge — battery level percentage (0-100%)"
  definition: "State of Charge represents the current battery energy level as a percentage from 0% (empty) to 100% (full)."

minsoc:
  term: "MinSOC"
  short: "Minimum State of Charge threshold"
  definition: "The minimum battery level the optimizer will maintain. The system prevents discharge below this threshold to protect battery health."

maxsoc:
  term: "MaxSOC"
  short: "Maximum State of Charge target"
  definition: "The maximum SOC the optimizer will charge to. Recommended at 90% to provide buffer for PV forecast inaccuracies."

gridsetpoint:
  term: "GridSetpoint"
  short: "Target grid power exchange value in watts"
  definition: "Determines how much power should flow to/from the grid in normal operation. Positive values draw from grid; negative values export to grid."

dynamicdischarge:
  term: "Dynamic Discharge"
  short: "Price-responsive real-time discharge algorithm"
  definition: "An advanced discharge mode that adjusts battery output in real-time based on electricity sale price fluctuations, rather than using fixed time windows."

rte:
  term: "RTE"
  short: "Round-Trip Efficiency"
  definition: "The ratio of energy output to energy input for a complete charge-discharge cycle. Measures overall battery system efficiency including conversion losses."

fastsetup:
  term: "FastSetup"
  short: "Quick initial plant configuration wizard"
  definition: "A guided setup process that runs after creating a new plant. Configures essential parameters and establishes initial connection to the inverter."

testmode:
  term: "Test Mode"
  short: "Observation mode — calculates but does not send commands"
  definition: "Initial operating mode for new plants. The optimizer runs calculations and forecasts but does not send any commands to the inverter. Should be kept active for approximately one week while the system calibrates."

ess:
  term: "ESS"
  short: "Energy Storage System"
  definition: "Victron's Energy Storage System module that manages battery charging, discharging, and grid interaction."

vrm:
  term: "VRM"
  short: "Victron Remote Management portal"
  definition: "Victron's cloud portal (VRM Portal) for remote monitoring and management of Victron systems."

modbus:
  term: "Modbus"
  short: "Serial communication protocol for industrial devices"
  definition: "A serial communication protocol used to communicate with inverters. GbbConnect2 uses ModbusInMqtt to wrap Modbus commands in MQTT messages."

modbusinmqtt:
  term: "ModbusInMqtt"
  short: "Modbus commands transported over MQTT"
  definition: "A protocol used by GbbConnect2 where Modbus register read/write commands are encapsulated in MQTT messages, enabling cloud-based inverter control."

selfconsumption:
  term: "Self-Consumption"
  short: "Percentage of solar energy used locally"
  definition: "The proportion of generated solar energy that is consumed directly by the household rather than exported to the grid."

selfsufficiency:
  term: "Self-Sufficiency"
  short: "Percentage of consumption covered by solar"
  definition: "The proportion of total household energy consumption that is supplied by the solar installation rather than imported from the grid."

correctionfactor:
  term: "Correction Factor"
  short: "PV forecast accuracy calibration"
  definition: "A multiplier calculated over approximately one week of operation that adjusts PV forecast values to match actual production, improving prediction accuracy."

batteryfulldate:
  term: "Battery Full Date"
  short: "Scheduled day for 100% SOC charge"
  definition: "Specific days of the month when the optimizer targets 100% battery SOC. Entered as comma-separated values (e.g., '1, 15'). Allows periodic full charge cycles for battery health."

gbbconnect2:
  term: "GbbConnect2"
  short: "Local dongle software for direct inverter connection"
  definition: "A software application that runs locally (Windows or Docker) to connect your inverter directly to GbbOptimizer via ModbusInMqtt, bypassing cloud services like Solarman."

dongledirect:
  term: "DongleDirect"
  short: "Dongle redirect connection method"
  definition: "A connection method where the inverter's WiFi dongle is reconfigured to communicate directly with GbbOptimizer's server instead of the manufacturer's cloud."

solarassistant:
  term: "SolarAssistant"
  short: "Third-party inverter monitoring software"
  definition: "A monitoring application that connects to inverters and publishes data via MQTT. Can be used as a bridge between Deye inverters and GbbOptimizer through Home Assistant."
