baseURL = "https://krzysztofahajdamowicz.github.io/rewrite-GbbOptimizer-manual/"
defaultContentLanguage = "pl"
defaultContentLanguageInSubdir = false
 
[languages]
  [languages.pl]
    languageName = "Polski"
    contentDir = "content/pl"
    title = "GbbOptimizer — Podręcznik"
    weight = 1
    [languages.pl.params]
      BookEditPath = "edit/main/content/pl"
 
  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    title = "GbbOptimizer — Manual"
    weight = 2
    [languages.en.params]
      BookEditPath = "edit/main/content/en"
 
[module]
  [[module.imports]]
    path = "github.com/alex-shpak/hugo-book"
 
[params]
  BookTheme = "auto"
  BookToC = true
  BookSection = "/"
  BookSearch = true
  BookRepo = "https://github.com/KrzysztofHajdamowicz/rewrite-GbbOptimizer-manual"
  BookTranslatedOnly = true
 
[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
 
[outputs]
  home = ["HTML", "RSS"]