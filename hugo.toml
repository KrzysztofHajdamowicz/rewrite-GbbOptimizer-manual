baseURL = "https://krzysztofahajdamowicz.github.io/rewrite-GbbOptimizer-manual/"
locale = "pl"
title = "GbbOptimizer — Podręcznik"

[module]
  [[module.imports]]
    path = "github.com/alex-shpak/hugo-book"

[params]
  BookTheme = "auto"
  BookToC = true
  BookSection = "/"
  BookSearch = true
  BookRepo = "https://github.com/KrzysztofHajdamowicz/rewrite-GbbOptimizer-manual"
  BookEditPath = "edit/main/content"

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputs]
  home = ["HTML", "RSS"]
